name: Windows x64 release build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - agent/uia-send-control-diagnostics
  push:
    branches:
      - agent/uia-send-control-diagnostics

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python UIA dependency
        shell: pwsh
        run: python -m pip install --disable-pip-version-check uiautomation

      - name: Compile Python tools
        shell: pwsh
        run: |
          python -m py_compile `
            tools/qn_discovery_lab/qn_uia_extract_messages_core.py `
            tools/qn_discovery_lab/qn_uia_extract_messages.py `
            tools/qn_discovery_lab/qn_uia_message_lifecycle.py `
            tools/qn_discovery_lab/qn_uia_lifecycle_probe.py `
            tools/qn_discovery_lab/qn_uia_withdraw_exact_probe.py

      - name: Run lifecycle tests
        shell: pwsh
        run: python -m unittest discover -s tools/qn_discovery_lab/tests

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore src/Bot.sln -PackagesDirectory src/packages -NonInteractive

      - name: Build Bot solution x64
        shell: pwsh
        run: |
          msbuild src/Bot.sln `
            /t:Build `
            /m `
            /nologo `
            /verbosity:minimal `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /bl:msbuild.binlog `
            '/flp:logfile=msbuild.log;verbosity=diagnostic'
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host '--- MSBuild errors ---'
            Select-String -Path msbuild.log -Pattern ': error ',' error CS',' error MSB' |
              Select-Object -Last 120 |
              ForEach-Object { Write-Host $_.Line }
            exit $code
          }

      - name: Upload MSBuild diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-diagnostics-x64-${{ github.sha }}
          path: |
            msbuild.log
            msbuild.binlog
          if-no-files-found: warn
          retention-days: 14

      - name: Verify Bot executable
        shell: pwsh
        run: |
          $exe = 'src/Bot/bin/x64/Release/Bot.exe'
          if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
            throw "Expected x64 build output not found: $exe"
          }
          Get-Item -LiteralPath $exe | Format-List FullName,Length,LastWriteTime

      - name: Upload x64 Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-bot-x64-release-${{ github.sha }}
          path: src/Bot/bin/x64/Release/**
          if-no-files-found: error
          retention-days: 14
