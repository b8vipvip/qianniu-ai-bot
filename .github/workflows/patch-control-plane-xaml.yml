name: Patch control plane XAML compatibility

on:
  push:
    branches:
      - feat/api-control-plane
    paths:
      - .github/workflows/patch-control-plane-xaml.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/api-control-plane
          fetch-depth: 0
      - name: Preserve legacy vision binding in hidden compatibility grid
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          path = Path('src/Bot/Options/CtlRobotOptions.xaml')
          text = path.read_text(encoding='utf-8-sig')
          old = '<DataGrid x:Name="gridEndpoints" SelectionChanged="gridEndpoints_SelectionChanged" MouseDoubleClick="gridEndpoints_MouseDoubleClickAdvanced" />'
          new = '''<DataGrid x:Name="gridEndpoints" SelectionChanged="gridEndpoints_SelectionChanged" MouseDoubleClick="gridEndpoints_MouseDoubleClickAdvanced">
                              <DataGrid.Columns>
                                  <DataGridTextColumn Header="视觉" Binding="{Binding VisionStatus}" />
                              </DataGrid.Columns>
                          </DataGrid>'''
          if old not in text and 'Binding="{Binding VisionStatus}"' not in text:
              raise SystemExit('expected hidden grid anchor not found')
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8-sig')
          ET.parse(path)
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot/Options/CtlRobotOptions.xaml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix: preserve hidden vision status binding"
          git push origin HEAD:feat/api-control-plane
