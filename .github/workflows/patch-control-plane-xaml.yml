name: Patch hidden API grid bindings

on:
  push:
    branches:
      - feat/api-control-plane
    paths:
      - .github/workflows/patch-control-plane-xaml.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/api-control-plane
          fetch-depth: 0
      - name: Add legacy masked key binding
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          path = Path('src/Bot/Options/CtlRobotOptions.xaml')
          text = path.read_text(encoding='utf-8-sig')
          anchor = '<DataGridTextColumn Header="视觉" Binding="{Binding VisionStatus}" />'
          addition = anchor + '\n                            <DataGridTextColumn Header="密钥" Binding="{Binding ApiKeyMasked}" />'
          if 'ApiKeyMasked' not in text:
              if anchor not in text:
                  raise SystemExit('vision binding anchor not found')
              text = text.replace(anchor, addition, 1)
              path.write_text(text, encoding='utf-8-sig')
          ET.parse(path)
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot/Options/CtlRobotOptions.xaml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix: preserve hidden masked key binding"
          git push origin HEAD:feat/api-control-plane
