name: Migrate bot observability and speed

on:
  push:
    branches:
      - agent/message-notifications-order-auto-reply
    paths:
      - '.migration/bot-observability-speed.part*'
      - '.github/workflows/migrate-bot-observability-speed.yml'

permissions:
  contents: write

concurrency:
  group: migrate-bot-observability-speed
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/message-notifications-order-auto-reply
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct and apply migration
        run: |
          cat .migration/bot-observability-speed.part* | base64 -d > /tmp/migrate_bot_observability_speed.py
          python -m py_compile /tmp/migrate_bot_observability_speed.py
          python /tmp/migrate_bot_observability_speed.py
          git diff --binary > migration-source.diff

      - name: Run repository static tests
        id: tests
        continue-on-error: true
        run: |
          python -m pip install pytest
          set -o pipefail
          python -m pytest -q --tb=short tests 2>&1 | tee migration-pytest.log

      - name: Verify expected source changes
        id: verify
        continue-on-error: true
        run: |
          grep -F 'Content="测试 Bot 真实流程"' src/Bot/Options/CtlRobotOptions.xaml
          grep -F 'ResponseProgressTracker.ObserveQuestion' src/Bot/ChromeNs/QN.cs
          grep -F 'ConfirmStableAsync(220)' src/Bot/ChromeNs/QN.cs
          grep -F 'Task.Run(() => RefreshRemoteHistory' src/Bot/ChromeNs/ConversationContextStore.cs
          grep -F 'SharedHttp' src/Bot/ChromeNs/MyOpenAI.cs
          grep -F 'Encoding.GetEncoding(936)' src/Bot/Options/CtlRobotOptions.xaml.cs
          grep -F 'CurrentFileName' src/BotLib/Log.cs

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-observability-speed-migration-${{ github.sha }}
          path: |
            migration-pytest.log
            migration-source.diff
          if-no-files-found: warn
          retention-days: 7

      - name: Stop on migration validation failure
        if: steps.tests.outcome != 'success' || steps.verify.outcome != 'success'
        run: exit 1

      - name: Commit migrated source
        shell: bash
        run: |
          rm -f .migration/bot-observability-speed.part*
          rmdir .migration 2>/dev/null || true
          rm -f .github/workflows/migrate-bot-observability-speed.yml
          rm -f migration-pytest.log migration-source.diff
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: add bot flow testing response timing and live logs'
          git fetch origin agent/message-notifications-order-auto-reply
          remote_sha=$(git rev-parse origin/agent/message-notifications-order-auto-reply)
          git rebase origin/agent/message-notifications-order-auto-reply
          git push --force-with-lease=refs/heads/agent/message-notifications-order-auto-reply:$remote_sha origin HEAD:agent/message-notifications-order-auto-reply
