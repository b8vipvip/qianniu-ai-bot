name: Apply knowledge learning loop patch

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - tools/apply_knowledge_learning_patch.py
      - .github/workflows/apply-knowledge-learning.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/apply_knowledge_learning_patch.py
      - .github/workflows/apply-knowledge-learning.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0

      - name: Apply source patch
        run: python tools/apply_knowledge_learning_patch.py

      - name: Validate patch structure
        run: git diff --check

      - name: Static diagnostics
        continue-on-error: true
        run: python -m pytest -q tests/test_knowledge_learning_static.py

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add self-learning answer workflow"
          git push origin HEAD:feat/knowledge-learning-loop
