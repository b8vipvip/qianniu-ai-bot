name: Apply rules and notifications patch

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - tools/apply_rules_notifications_patch.py
      - .github/workflows/apply-rules-notifications.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/apply_rules_notifications_patch.py
      - .github/workflows/apply-rules-notifications.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0
          show-progress: false

      - name: Apply patch
        id: patch
        continue-on-error: true
        shell: bash
        run: python tools/apply_rules_notifications_patch.py > patch.log 2>&1

      - name: Persist failure diagnostics
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          cp patch.log /tmp/patch.log
          git reset --hard HEAD
          cp /tmp/patch.log tools/rules-notifications-patch-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/rules-notifications-patch-error.txt
          git commit -m "chore: record rules patch failure"
          git push origin HEAD:feat/knowledge-learning-loop
          exit 1

      - name: Validate source structure
        if: steps.patch.outcome == 'success'
        run: git diff --check

      - name: Static diagnostics
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: python -m pytest -q tests/test_rules_notifications_static.py tests/test_history_scan_static.py tests/test_knowledge_learning_static.py

      - name: Commit source changes
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot tests/test_rules_notifications_static.py
          git commit -m "feat: add off-hours handoff rules and notifications"
          git push origin HEAD:feat/knowledge-learning-loop
