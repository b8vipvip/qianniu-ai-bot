name: Apply history scan patch

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - tools/apply_history_scan_patch.py
      - .github/workflows/apply-history-scan.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0

      - name: Apply history scan source patch
        run: python tools/apply_history_scan_patch.py

      - name: Validate source patch
        run: |
          git diff --check
          python -m pytest -q tests/test_history_scan_static.py tests/test_knowledge_learning_static.py

      - name: Commit history scan source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot tests/test_history_scan_static.py
          git commit -m "feat: scan historical chats into knowledge base"
          git push origin HEAD:feat/knowledge-learning-loop
