name: Cleanup history scan patch files

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - .github/workflows/apply-history-scan.yml
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-history-scan.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0

      - name: Remove one-time patch payload
        shell: bash
        run: |
          git rm -r tools/apply_history_scan_patch.py tools/history_scan_payload
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove history scan patch payload"
          git push origin HEAD:feat/knowledge-learning-loop
