name: API control plane CI

on:
  push:
    branches:
      - feat/api-control-plane
    paths:
      - services/api-control-plane/**
      - src/Bot/ChromeNs/KnowledgeContextualReplyService.cs
      - src/Directory.Build.targets
      - tools/patch_contextual_knowledge_routing.py
      - .github/workflows/api-control-plane-ci.yml
  pull_request:
    paths:
      - services/api-control-plane/**
      - src/Bot/ChromeNs/KnowledgeContextualReplyService.cs
      - src/Directory.Build.targets
      - .github/workflows/api-control-plane-ci.yml

permissions:
  contents: write

jobs:
  apply-contextual-knowledge-patch:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/api-control-plane
          fetch-depth: 0

      - name: Apply deterministic source patch
        run: python tools/patch_contextual_knowledge_routing.py

      - name: Validate and commit source patch
        shell: bash
        run: |
          grep -q 'KnowledgeContextualReplyService.Analyze' src/Bot/ChromeNs/MyOpenAI.cs
          grep -q '本地知识库上下文' src/Bot/ChromeNs/MyOpenAI.cs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot/ChromeNs/MyOpenAI.cs
          if git diff --cached --quiet; then
            echo "MyOpenAI.cs is already patched"
            exit 0
          fi
          git commit -m "fix: contextualize knowledge-backed follow-up replies"
          git push origin HEAD:feat/api-control-plane

  test-build-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api-control-plane/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m py_compile app.py tests/test_control_plane.py

      - name: Run control plane tests
        run: python -m pytest -q

      - name: Check browser JavaScript syntax
        run: node --check static/app.js

      - name: Build Ubuntu container
        run: docker build -t qianniu-api-control-plane:${{ github.sha }} .

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config >/dev/null

      - name: Clean generated caches
        run: |
          rm -f .env
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

      - name: Upload Ubuntu deployment package
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-api-control-plane-ubuntu-${{ github.sha }}
          path: |
            services/api-control-plane/app.py
            services/api-control-plane/static/**
            services/api-control-plane/tests/**
            services/api-control-plane/requirements.txt
            services/api-control-plane/Dockerfile
            services/api-control-plane/docker-compose.yml
            services/api-control-plane/Caddyfile
            services/api-control-plane/.env.example
            services/api-control-plane/.dockerignore
            services/api-control-plane/README.md
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
