name: API control plane CI

on:
  push:
    branches:
      - feat/api-control-plane
      - agent/reply-dedup-knowledge-navigation
    paths:
      - services/api-control-plane/**
      - tools/apply_humanlike_reply_v2.py
      - tools/repair_humanlike_patcher.py
      - src/Bot/ChromeNs/BuyerMessageBurstCoordinator.cs
      - .github/workflows/api-control-plane-ci.yml
      - .github/workflows/apply-humanlike-reply-v2.yml
  pull_request:
    paths:
      - services/api-control-plane/**
      - .github/workflows/api-control-plane-ci.yml

permissions:
  contents: write

jobs:
  apply-humanlike-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/reply-dedup-knowledge-navigation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply staged patch when present
        id: patch
        shell: bash
        run: |
          if [ ! -f tools/apply_humanlike_reply_v2.py ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"
          set +e
          if [ -f tools/repair_humanlike_patcher.py ]; then
            python tools/repair_humanlike_patcher.py 2>&1 | tee humanlike-patch.log
            repair_status=${PIPESTATUS[0]}
          else
            repair_status=0
            : > humanlike-patch.log
          fi
          if [ "$repair_status" -eq 0 ]; then
            python -m py_compile tools/apply_humanlike_reply_v2.py 2>&1 | tee -a humanlike-patch.log
            compile_status=${PIPESTATUS[0]}
          else
            compile_status=$repair_status
          fi
          if [ "$compile_status" -eq 0 ]; then
            python tools/apply_humanlike_reply_v2.py 2>&1 | tee -a humanlike-patch.log
            patch_status=${PIPESTATUS[0]}
          else
            patch_status=$compile_status
          fi
          echo "status=$patch_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload patch diagnostics
        if: always() && steps.patch.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: humanlike-patch-${{ github.sha }}
          path: humanlike-patch.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop on patch failure
        if: steps.patch.outputs.present == 'true' && steps.patch.outputs.status != '0'
        run: |
          cat humanlike-patch.log
          exit 1

      - name: Run focused static tests
        if: steps.patch.outputs.present == 'true' && steps.patch.outputs.status == '0'
        run: python -m pytest -q tests/test_humanlike_burst_static.py tests/test_wecom_app_bridge_static.py tests/test_rules_notifications_static.py

      - name: Run control plane tests
        if: steps.patch.outputs.present == 'true' && steps.patch.outputs.status == '0'
        working-directory: services/api-control-plane
        run: |
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: Commit integrated implementation
        if: steps.patch.outputs.present == 'true' && steps.patch.outputs.status == '0'
        run: |
          rm -f tools/apply_humanlike_reply_v2.py
          rm -f tools/repair_humanlike_patcher.py
          rm -f .github/workflows/apply-humanlike-reply-v2.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: batch fragmented buyer messages before replying"
          git push origin HEAD:agent/reply-dedup-knowledge-navigation

  test-build-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api-control-plane/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m py_compile app.py bootstrap.py wecom_bridge.py wecom_crypto.py tests/test_control_plane.py tests/test_wecom_bridge.py

      - name: Run control plane tests
        run: python -m pytest -q --tb=short 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-control-plane-pytest-${{ github.sha }}
          path: services/api-control-plane/pytest.log
          if-no-files-found: warn
          retention-days: 7

      - name: Check browser JavaScript syntax
        run: node --check static/app.js

      - name: Build Ubuntu container
        run: docker build -t qianniu-api-control-plane:${{ github.sha }} .

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config >/dev/null
          docker compose -f docker-compose.bt.yml config >/dev/null

      - name: Clean generated caches
        run: |
          rm -f .env
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

      - name: Upload Ubuntu deployment package
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-api-control-plane-ubuntu-${{ github.sha }}
          path: |
            services/api-control-plane/app.py
            services/api-control-plane/bootstrap.py
            services/api-control-plane/wecom_bridge.py
            services/api-control-plane/wecom_crypto.py
            services/api-control-plane/static/**
            services/api-control-plane/tests/**
            services/api-control-plane/requirements.txt
            services/api-control-plane/Dockerfile
            services/api-control-plane/docker-compose.yml
            services/api-control-plane/docker-compose.bt.yml
            services/api-control-plane/Caddyfile
            services/api-control-plane/.env.example
            services/api-control-plane/.dockerignore
            services/api-control-plane/README.md
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
