    text = read("src/Directory.Build.targets")
    assert "ReplyDeduplicationService.cs" in text
    assert "BuyerMessageBurstCoordinator.cs" in text
    assert '<Compile Include="$(MSBuildProjectDirectory)\\ChromeNs\\ReplyDeduplicationService.cs" />' in text
    assert '<Compile Include="$(MSBuildProjectDirectory)\\ChromeNs\\BuyerMessageBurstCoordinator.cs" />' in text
''', encoding="utf-8")

          vision_path = root / "tests/test_vision_static.py"
          vision = vision_path.read_text(encoding="utf-8")
          old_vision = '''def test_message_safety_and_cross_buyer_guard_remain_in_path():
              qn = read('src/Bot/ChromeNs/QN.cs')
              assert 'IncomingMessageSafety.Evaluate' in qn
              assert 'BuildMessageKey' in qn
              assert 'VisionReplyTask { SellerNick = sellerNick, BuyerNick = buyerNick, MessageKey = messageKey' in qn
              assert 'SendTextWithRetryAsync(task.BuyerNick' in qn
              assert 'EnsureActiveBuyerForSendAsync' in qn and 'GetCurrentConversationID' in qn
              assert '识别完成，但目标买家会话未确认，未发送。' in qn
          '''
          new_vision = '''def test_message_safety_and_cross_buyer_guard_remain_in_path():
              qn = read('src/Bot/ChromeNs/QN.cs')
              assert 'IncomingMessageSafety.Evaluate' in qn
              assert 'BuildMessageKey' in qn
              assert 'var task = new VisionReplyTask' in qn
              assert 'SellerNick = burst.SellerNick' in qn
              assert 'BuyerNick = burst.BuyerNick' in qn
              assert 'MessageKey = visionItem.MessageKey' in qn
              assert 'CombinedQuestion = burst.CombinedQuestion' in qn
              assert 'SendTextWithRetryAsync(burst.BuyerNick, answer, 1)' in qn
              assert 'EnsureActiveBuyerForSendAsync' in qn and 'GetCurrentConversationID' in qn
              assert '识别完成，但目标买家会话未确认，未发送。' in qn
          '''
          if old_vision in vision:
              vision = vision.replace(old_vision, new_vision, 1)
              vision_path.write_text(vision, encoding="utf-8")
          elif new_vision not in vision:
              raise RuntimeError("vision static guard block not found")
          PY

      - name: Run migrated static tests
        run: python -m pip install pytest && python -m pytest -q tests

      - name: Commit code and guard migration
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/Bot/ChromeNs/MyOpenAI.cs tests/test_contextual_knowledge_reply.py tests/test_reply_dedup_navigation_static.py tests/test_vision_static.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix: defer learning without dereferencing missing knowledge"
          git fetch origin agent/reply-dedup-knowledge-navigation
          remote_sha=$(git rev-parse origin/agent/reply-dedup-knowledge-navigation)
          git rebase origin/agent/reply-dedup-knowledge-navigation
          git push --force-with-lease=refs/heads/agent/reply-dedup-knowledge-navigation:$remote_sha origin HEAD:agent/reply-dedup-knowledge-navigation
