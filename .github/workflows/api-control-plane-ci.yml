name: Migrate burst reply static guards

on:
  pull_request:
    paths:
      - .github/workflows/api-control-plane-ci.yml
      - tools/migrate_burst_static_guards.py
      - src/Bot/ChromeNs/MyOpenAI.cs
      - tests/test_contextual_knowledge_reply.py
      - tests/test_reply_dedup_navigation_static.py
      - tests/test_vision_static.py

permissions:
  contents: write

concurrency:
  group: migrate-burst-reply-static-guards
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/reply-dedup-knowledge-navigation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply code and guard migration
        run: python tools/migrate_burst_static_guards.py

      - name: Run migrated static tests
        run: python -m pip install pytest && python -m pytest -q tests

      - name: Commit code and guard migration
        shell: bash
        run: |
          rm -f tools/migrate_burst_static_guards.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/Bot/ChromeNs/MyOpenAI.cs tests/test_contextual_knowledge_reply.py tests/test_reply_dedup_navigation_static.py tests/test_vision_static.py tools/migrate_burst_static_guards.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix: defer learning without missing knowledge"
          git fetch origin agent/reply-dedup-knowledge-navigation
          remote_sha=$(git rev-parse origin/agent/reply-dedup-knowledge-navigation)
          git rebase origin/agent/reply-dedup-knowledge-navigation
          git push --force-with-lease=refs/heads/agent/reply-dedup-knowledge-navigation:$remote_sha origin HEAD:agent/reply-dedup-knowledge-navigation
