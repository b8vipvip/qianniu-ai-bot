name: Finalize human-like reply integration

on:
  push:
    branches:
      - agent/reply-dedup-knowledge-navigation
    paths:
      - .github/workflows/api-control-plane-ci.yml
      - tools/api-control-plane-ci.normal.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/reply-dedup-knowledge-navigation
          fetch-depth: 0

      - name: Remove generated files and restore normal CI
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          if ! grep -qx '__pycache__/' .gitignore; then
            printf '\n# Python generated caches\n__pycache__/\n*.py[cod]\n.pytest_cache/\n' >> .gitignore
          fi
          cp tools/api-control-plane-ci.normal.yml .github/workflows/api-control-plane-ci.yml
          rm -f tools/api-control-plane-ci.normal.yml

      - name: Commit clean implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove generated caches and restore CI"
          git push origin HEAD:agent/reply-dedup-knowledge-navigation
