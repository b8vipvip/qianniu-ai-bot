name: Apply vision send guard fix

on:
  pull_request:
    branches:
      - master
    paths:
      - tools/preserve_vision_send_guard.py
      - .github/workflows/apply-vision-send-guard-fix.yml

permissions:
  contents: write

concurrency:
  group: apply-vision-send-guard-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/message-notifications-order-auto-reply
          fetch-depth: 0

      - name: Apply compatibility patch
        run: |
          python -m py_compile tools/preserve_vision_send_guard.py
          python tools/preserve_vision_send_guard.py

      - name: Run repository static tests
        run: |
          python -m pip install pytest
          python -m pytest -q --tb=short tests

      - name: Commit final source
        shell: bash
        run: |
          rm -f tools/preserve_vision_send_guard.py
          rm -f .github/workflows/apply-vision-send-guard-fix.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: preserve vision send failure compatibility"
          git fetch origin agent/message-notifications-order-auto-reply
          remote_sha=$(git rev-parse origin/agent/message-notifications-order-auto-reply)
          git rebase origin/agent/message-notifications-order-auto-reply
          git push --force-with-lease=refs/heads/agent/message-notifications-order-auto-reply:$remote_sha origin HEAD:agent/message-notifications-order-auto-reply
