name: API control plane static diagnostics

on:
  push:
    branches:
      - feat/api-control-plane
    paths:
      - tests/**
      - src/Bot/Options/**
      - services/api-control-plane/**
      - .github/workflows/api-control-plane-static-diagnostics.yml

permissions:
  contents: read

jobs:
  static-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - name: Run root static tests
        id: tests
        continue-on-error: true
        shell: bash
        run: python -m pytest -q tests > static-tests.log 2>&1
      - name: Upload static test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-control-plane-static-test-log-${{ github.sha }}
          path: static-tests.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
