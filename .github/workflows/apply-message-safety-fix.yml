name: Apply message safety fix

on:
  push:
    branches:
      - integration/master-candidate
    paths:
      - .github/workflows/apply-message-safety-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-2022
    timeout-minutes: 10

    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4
        with:
          ref: integration/master-candidate
          fetch-depth: 0

      - name: Apply source patch
        shell: pwsh
        run: .github/scripts/apply-message-safety-fix.ps1

      - name: Remove one-time patch files
        shell: pwsh
        run: |
          Remove-Item -LiteralPath '.github/scripts/apply-message-safety-fix.ps1' -Force
          Remove-Item -LiteralPath '.github/workflows/apply-message-safety-fix.yml' -Force

      - name: Commit patched sources
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if ((git diff --cached --name-only).Count -eq 0) {
            Write-Host 'No source changes to commit.'
            exit 0
          }
          git commit -m 'fix: isolate incoming conversations and skip unsafe messages'
          git push origin HEAD:integration/master-candidate
