name: Apply all buyers scan patch

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - tools/apply_all_buyers_scan_patch.py
      - .github/workflows/apply-all-buyers-scan.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/apply_all_buyers_scan_patch.py
      - .github/workflows/apply-all-buyers-scan.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0

      - name: Apply all buyers contact source patch
        run: python tools/apply_all_buyers_scan_patch.py

      - name: Validate source structure
        run: git diff --check

      - name: Static diagnostics
        continue-on-error: true
        run: python -m pytest -q tests/test_history_scan_static.py tests/test_knowledge_learning_static.py

      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot/Knowledge/ChatHistoryScanService.cs src/Bot/Knowledge/ChatHistoryScanWindow.cs tests/test_history_scan_static.py
          git commit -m "fix: scan contacts from Qianniu all buyers list"
          git push origin HEAD:feat/knowledge-learning-loop
