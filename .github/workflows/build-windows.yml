name: Build Windows Bot

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/Bot/**'
      - 'src/BotLib/**'
      - 'src/DbEntity/**'
      - 'src/*.sln'
      - 'src/packages.config'
      - '.github/workflows/build-windows.yml'

permissions:
  contents: write

env:
  CONFIGURATION: Debug
  PLATFORM: Any CPU

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore src\Bot.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild src\Bot.sln /m /t:Rebuild /p:Configuration="${{ env.CONFIGURATION }}" /p:Platform="${{ env.PLATFORM }}"

      - name: Upload Bin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-bot-bin
          path: src\Bin\**

      - name: Commit compiled Bin back to master
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f src/Bin
          $changes = git status --porcelain src/Bin
          if ($changes) {
            git commit -m "build: update compiled Bot binaries [skip ci]"
            git push origin HEAD:master
          } else {
            Write-Host "No compiled binary changes."
          }
