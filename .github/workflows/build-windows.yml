name: Build Windows Bot

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/Bot/**'
      - 'src/BotLib/**'
      - 'src/DbEntity/**'
      - 'src/*.sln'
      - 'src/Directory.Build.props'
      - '.github/workflows/build-windows.yml'

permissions:
  contents: write

env:
  CONFIGURATION: Debug
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore and build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Force -Path ci-last-build | Out-Null
          $exitCode = 0

          dotnet --info | Out-File env.log -Encoding utf8
          nuget help | Out-File nuget-version.log -Encoding utf8
          msbuild -version | Out-File msbuild-version.log -Encoding utf8
          Get-ChildItem src\Bin | Select-Object Name,Length,LastWriteTime | Format-Table | Out-File bin-before.log -Encoding utf8

          foreach ($proj in @('src\Bot\Bot.csproj','src\DbEntity\DbEntity.csproj')) {
            if (Test-Path $proj) {
              $xml = Get-Content $proj -Raw
              $xml = [regex]::Replace($xml, '(?s)\s*<Reference Include="TopSdk[^>]*>.*?</Reference>', '')
              if ($proj -like '*\Bot\Bot.csproj' -and $xml -notmatch 'ICSharpCode\.SharpZipLib') {
                $sharpRef = '    <Reference Include="ICSharpCode.SharpZipLib"><HintPath>..\packages\SharpZipLib.1.4.2\lib\netstandard2.0\ICSharpCode.SharpZipLib.dll</HintPath><Private>True</Private></Reference>'
                $xml = $xml -replace '(\s*<Reference Include="System" />)', "`r`n$sharpRef`$1"
              }
              Set-Content $proj -Value $xml -Encoding UTF8
            }
          }

          nuget restore src\Bot.sln -NonInteractive -Verbosity detailed *>&1 | Tee-Object -FilePath restore.log
          if ($LASTEXITCODE -ne 0) { $exitCode = $LASTEXITCODE }

          if ($exitCode -eq 0) {
            msbuild src\Bot.sln /m /t:Rebuild /p:Configuration="${{ env.CONFIGURATION }}" /p:Platform="${{ env.PLATFORM }}" /v:minimal /fl /flp:logfile=build.log`;verbosity=diagnostic *>&1 | Tee-Object -FilePath build-console.log
            if ($LASTEXITCODE -ne 0) { $exitCode = $LASTEXITCODE }
          }

          if (Test-Path build.log) { Get-Content build.log -Tail 260 | Out-File ci-last-build\build-tail.txt -Encoding utf8 }
          if (Test-Path build-console.log) { Get-Content build-console.log -Tail 260 | Out-File ci-last-build\build-console-tail.txt -Encoding utf8 }
          if (Test-Path restore.log) { Get-Content restore.log -Tail 160 | Out-File ci-last-build\restore-tail.txt -Encoding utf8 }
          Get-ChildItem src\Bin -ErrorAction SilentlyContinue | Select-Object Name,Length,LastWriteTime | Format-Table | Out-File ci-last-build\bin-after.txt -Encoding utf8
          Set-Content ci-last-build\exit-code.txt -Value $exitCode -Encoding utf8
          Write-Host "Build exit code: $exitCode"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-bot-build-logs
          path: |
            *.log
            ci-last-build\**
            src\**\*.log

      - name: Upload Bin Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qianniu-bot-bin
          path: src\Bin\**

      - name: Commit CI logs and compiled Bin
        if: always()
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f ci-last-build
          $exitCode = 1
          if (Test-Path ci-last-build\exit-code.txt) { $exitCode = [int](Get-Content ci-last-build\exit-code.txt -Raw) }
          if ($exitCode -eq 0) { git add -f src/Bin }
          $changes = git status --porcelain ci-last-build src/Bin
          if ($changes) {
            if ($exitCode -eq 0) { git commit -m "build: update compiled Bot binaries [skip ci]" } else { git commit -m "ci: persist failed build logs [skip ci]" }
            git push origin HEAD:master
          } else {
            Write-Host "No CI log or binary changes."
          }

      - name: Fail job if needed
        shell: pwsh
        run: |
          $exitCode = 1
          if (Test-Path ci-last-build\exit-code.txt) { $exitCode = [int](Get-Content ci-last-build\exit-code.txt -Raw) }
          exit $exitCode
