name: Fix Desk answer source forwarding

on:
  push:
    branches:
      - feat/knowledge-learning-loop
    paths:
      - tools/fix_desk_answer_source.py
      - .github/workflows/fix-desk-answer-source.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/knowledge-learning-loop
          fetch-depth: 0
      - run: python tools/fix_desk_answer_source.py
      - run: git diff --check
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Bot/Automation/ChatDeskNs/Desk.cs
          git commit -m "fix: forward answer source through Desk"
          git push origin HEAD:feat/knowledge-learning-loop
