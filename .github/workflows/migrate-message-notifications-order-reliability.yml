name: Migrate message reliability and settings

on:
  push:
    branches:
      - agent/message-notifications-order-auto-reply
    paths:
      - tools/migrate_message_notification_order_reliability.py
      - .github/workflows/migrate-message-notifications-order-reliability.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/migrate_message_notification_order_reliability.py
      - .github/workflows/migrate-message-notifications-order-reliability.yml

permissions:
  contents: write

concurrency:
  group: migrate-message-notifications-order-reliability
  cancel-in-progress: false

jobs:
  migrate:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/message-notifications-order-auto-reply
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply one-shot migration
        run: |
          python -m py_compile tools/migrate_message_notification_order_reliability.py
          python tools/migrate_message_notification_order_reliability.py
          python - <<'PY'
          from pathlib import Path
          path = Path('src/Bot/ChromeNs/QN.cs')
          raw = path.read_bytes()
          bom = raw.startswith(b'\xef\xbb\xbf')
          text = raw.decode('utf-8-sig')
          old = 'if (ctl != null) ctl.SetSendResult(sendOk, sendOk ? "已发送（合并图片与本轮消息）" : "发送失败：" + rpa.GetSendFailureReason());'
          new = 'if (ctl != null) ctl.SetSendResult(sendOk, sendOk ? "已发送（合并图片与本轮消息）" : "识别完成，但目标买家会话未确认，未发送。原因：" + rpa.GetSendFailureReason());'
          if text.count(old) != 1:
              raise SystemExit('vision guard patch match count=' + str(text.count(old)))
          text = text.replace(old, new, 1)
          path.write_bytes(text.encode('utf-8-sig' if bom else 'utf-8'))
          PY
          git diff --binary > migration-source.diff

      - name: Run repository static tests
        id: tests
        continue-on-error: true
        run: |
          python -m pip install pytest
          set -o pipefail
          python -m pytest -q --tb=short tests 2>&1 | tee migration-pytest.log

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: message-migration-diagnostics-${{ github.sha }}
          path: |
            migration-pytest.log
            migration-source.diff
          if-no-files-found: error
          retention-days: 7

      - name: Stop on static test failure
        if: steps.tests.outcome != 'success'
        run: exit 1

      - name: Verify expected source changes
        run: |
          grep -F 'public partial class QN' src/Bot/ChromeNs/QN.cs
          grep -F 'public partial class QNRpa' src/Bot/ChromeNs/QNRpa.cs
          grep -F 'Header = "消息通知"' src/Bot/Options/CtlRobotOptions.xaml.cs
          grep -F 'OrderPlacedAutoReplyService.TryCreatePlan' src/Bot/ChromeNs/QN.cs
          grep -F 'QNRpa.ReliableSend.cs' src/Directory.Build.targets

      - name: Commit migrated source
        shell: bash
        run: |
          rm -f tools/migrate_message_notification_order_reliability.py
          rm -f .github/workflows/migrate-message-notifications-order-reliability.yml
          rm -f migration-pytest.log migration-source.diff
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type d -name .pytest_cache -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: improve message recovery notifications and order replies"
          git fetch origin agent/message-notifications-order-auto-reply
          remote_sha=$(git rev-parse origin/agent/message-notifications-order-auto-reply)
          git rebase origin/agent/message-notifications-order-auto-reply
          git push --force-with-lease=refs/heads/agent/message-notifications-order-auto-reply:$remote_sha origin HEAD:agent/message-notifications-order-auto-reply
